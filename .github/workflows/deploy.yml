name: Build & Deploy Nexora

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1: Build & push all Docker images ──────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Detect which parts of the codebase changed
      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'nexora-backend/**'
              - '!nexora-backend/chatbot/**'
            chatbot:
              - 'nexora-backend/chatbot/**'
            frontend:
              - 'nexora-frontend/**'

      # Build backend image using docker CLI directly — avoids secret interpolation issues
      - name: Build & push backend image
        if: steps.changes.outputs.backend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nexora-backend:latest -f ./nexora-backend/Dockerfile ./nexora-backend
          docker push ${{ secrets.DOCKER_USERNAME }}/nexora-backend:latest

      # Build chatbot image
      - name: Build & push chatbot image
        if: steps.changes.outputs.chatbot == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nexora-chatbot:latest -f ./nexora-backend/chatbot/Dockerfile ./nexora-backend/chatbot
          docker push ${{ secrets.DOCKER_USERNAME }}/nexora-chatbot:latest

      # Build frontend image
      - name: Build & push frontend image
        if: steps.changes.outputs.frontend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nexora-frontend:latest -f ./nexora-frontend/Dockerfile ./nexora-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/nexora-frontend:latest

  # ── Job 2: Deploy to EC2 (only runs after build succeeds) ──
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH into EC2 & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/nexora
            docker compose pull
            docker compose up -d --no-deps --force-recreate backend chatbot frontend
            docker image prune -f

      - name: Verify containers are running
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== Health checks ==="
            curl -sf http://localhost:8000 && echo "✅ Backend OK" || echo "❌ Backend FAILED"
            curl -sf http://localhost:8001/health && echo "✅ Chatbot OK" || echo "❌ Chatbot FAILED"
            curl -sf http://localhost:80 && echo "✅ Frontend OK" || echo "❌ Frontend FAILED"
